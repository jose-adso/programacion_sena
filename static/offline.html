<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sin conexión - SENA</title>
  <link rel="icon" type="image/png" href="/static/16 mar 2026, 09_19_27.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .offline-card {
      background: white;
      border-radius: 16px;
      padding: 3rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
      max-width: 500px;
    }
    .offline-icon {
      font-size: 5rem;
      color: #ff6b6b;
      margin-bottom: 1.5rem;
    }
    .wifi-icon {
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="offline-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="wifi-icon">
        <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
        <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>
    </div>
    <h1 class="mb-4">Sin conexión</h1>
    <p class="text-muted mb-4">
      No hay conexión a internet. La aplicación funcionará con los datos en caché.
    </p>
    <button class="btn btn-primary btn-lg" onclick="window.location.reload()">
      Reintentar conexión
    </button>
    <p class="mt-3 small text-muted">
      <span id="connection-status">Verificando estado...</span>
    </p>
  </div>

  <script>
    // Detectar estado de conexión
    function updateOnlineStatus() {
      const status = document.getElementById('connection-status');
      if (navigator.onLine) {
        status.textContent = '¡Conexión restablecida! Recargando...';
        status.className = 'text-success';
        setTimeout(() => window.location.reload(), 1500);
      } else {
        status.textContent = 'Sin conexión';
        status.className = 'text-danger';
      }
    }

    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();
  </script>
</body>
</html>
